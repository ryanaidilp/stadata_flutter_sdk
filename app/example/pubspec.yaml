  flutter_screenutil: ^5.9.3
  flutter_widget_from_html: ^0.17.2
  gap: ^3.0.1
  get_it: ^9.2.1
  html: ^0.15.6
  html_unescape: ^2.0.0
  injectable: ^3.0.0
  intl: ^0.20.2
  number_paginator: ^1.1.2
